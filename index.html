<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Performance Flow Nebula</title>
<style>
body { margin:0; overflow:hidden; background:black; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/controls/OrbitControls.js"></script>

<script>

let scene, camera, renderer, controls, nebula;
let clock = new THREE.Clock();

init();
animate();

function init(){

    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
    camera.position.set(0,0,4);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);

    // ===== GPU GENERATED POINT CLOUD =====

    const COUNT = 300000;

    const positions = new Float32Array(COUNT * 3);
    const colors = new Float32Array(COUNT * 3);

    for(let i=0;i<COUNT;i++){

        let r = Math.pow(Math.random(), 0.6);
        let theta = Math.random() * Math.PI * 2;
        let phi = Math.acos(2*Math.random()-1);

        let x = r * Math.sin(phi) * Math.cos(theta);
        let y = r * Math.sin(phi) * Math.sin(theta);
        let z = r * Math.cos(phi);

        positions[i*3] = x*1.5;
        positions[i*3+1] = y*1.0;
        positions[i*3+2] = z*0.6;

        // Cinematic color
        colors[i*3]   = 1.0;
        colors[i*3+1] = 0.3 + r*0.4;
        colors[i*3+2] = 0.1;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors,3));

    const material = new THREE.ShaderMaterial({

        transparent:true,
        depthWrite:false,
        blending:THREE.AdditiveBlending,
        vertexColors:true,

        uniforms:{
            time:{value:0},
            size:{value:8.0}
        },

        vertexShader:`

            uniform float time;
            uniform float size;
            varying vec3 vColor;

            float noise(vec3 p){
                return sin(p.x*3.0 + time)
                     + cos(p.y*2.0 + time*0.8)
                     + sin(p.z*4.0 + time*0.5);
            }

            void main(){

                vColor = color;

                vec3 pos = position;

                float n = noise(pos);
                pos += normalize(pos) * n * 0.05;

                vec4 mvPosition = modelViewMatrix * vec4(pos,1.0);
                gl_PointSize = size * (300.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,

        fragmentShader:`

            varying vec3 vColor;

            void main(){
                float dist = length(gl_PointCoord - vec2(0.5));
                float alpha = smoothstep(0.5, 0.0, dist);
                gl_FragColor = vec4(vColor, alpha);
            }
        `
    });

    nebula = new THREE.Points(geometry, material);
    scene.add(nebula);

    window.addEventListener('resize', onResize);
}

function animate(){
    requestAnimationFrame(animate);

    let t = clock.getElapsedTime();
    nebula.material.uniforms.time.value = t;

    controls.update();
    renderer.render(scene, camera);
}

function onResize(){
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
}

</script>

</body>
</html>
