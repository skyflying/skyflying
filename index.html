<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cinematic Flowing Nebula</title>
<style>
body { margin:0; overflow:hidden; background:black; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/loaders/PLYLoader.js"></script>

<script>

let scene, camera, renderer, controls;
let nebula;
let clock = new THREE.Clock();

init();
animate();

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth/window.innerHeight,
        0.1,
        100
    );
    camera.position.set(0,0,4);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);

    const loader = new THREE.PLYLoader();

    loader.load('nebula_cinematic_RGBA_1M.ply', function(geometry){

        geometry.computeBoundingSphere();

        const material = new THREE.ShaderMaterial({

            transparent:true,
            depthWrite:false,
            blending:THREE.AdditiveBlending,
            vertexColors:true,

            uniforms:{
                time:{value:0},
                pointSize:{value:12.0}
            },

            vertexShader:`

                uniform float time;
                uniform float pointSize;
                attribute vec3 color;
                varying vec3 vColor;

                void main(){

                    vColor = color;

                    vec3 pos = position;

                    float flow = sin(pos.x*3.0 + time*0.5)
                               + cos(pos.y*2.5 + time*0.4)
                               + sin(pos.z*2.0 + time*0.6);

                    pos += normalize(pos) * flow * 0.03;

                    vec4 mvPosition = modelViewMatrix * vec4(pos,1.0);

                    gl_PointSize = pointSize * (300.0 / -mvPosition.z);

                    gl_Position = projectionMatrix * mvPosition;
                }
            `,

            fragmentShader:`

                varying vec3 vColor;

                void main(){

                    float dist = length(gl_PointCoord - vec2(0.5));

                    float alpha = smoothstep(0.5, 0.0, dist);

                    gl_FragColor = vec4(vColor, alpha);
                }
            `
        });

        nebula = new THREE.Points(geometry, material);
        scene.add(nebula);

    });

    window.addEventListener('resize', onResize);
}

function animate(){

    requestAnimationFrame(animate);

    let delta = clock.getElapsedTime();

    if(nebula){
        nebula.material.uniforms.time.value = delta;
    }

    controls.update();
    renderer.render(scene, camera);
}

function onResize(){

    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

</script>

</body>
</html>
